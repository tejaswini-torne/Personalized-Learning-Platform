<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Test - SQL Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#f0f4ff;color:#333;display:flex;}
.main-content{margin:auto;padding:2rem;flex:1;max-width:1000px;}
h1{text-align:center;color:#1E3A8A;margin-bottom:1.5rem;}

.edit-test{
  background:white;border-radius:12px;padding:1.5rem;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin:0 auto;
}
.edit-test h2{color:#1E3A8A;margin-bottom:1rem;}
.edit-test input[type="text"],.edit-test textarea{
  padding:0.8rem;border:1px solid #ccc;border-radius:8px;
  font-size:1rem;width:100%;margin-bottom:1rem;
}

.question{
  border:1px solid #e0e7ff;border-radius:12px;
  padding:1rem;margin-bottom:1.2rem;background:#f9faff;
}
.question h3{margin-bottom:0.5rem;color:#1E3A8A;}

.options{margin-top:0.5rem;display:flex;flex-direction:column;gap:0.6rem;}
.option-item{display:flex;align-items:center;gap:0.6rem;}
.option-item input[type="text"]{
  flex:1;padding:0.6rem;border:1px solid #ccc;border-radius:8px;
}
.option-item input[type="radio"]{
  accent-color:#1E3A8A;transform:scale(1.2);
}

.add-option-btn,.add-question-btn,.save-test-btn,.remove-question-btn{
  margin-top:0.8rem;border:none;padding:0.6rem 1.2rem;
  border-radius:8px;font-weight:600;cursor:pointer;transition:0.3s;
}
.add-option-btn{background:#e0e7ff;color:#1E3A8A;}
.add-option-btn:hover{background:#c7d2fe;}

.remove-question-btn{background:#ef4444;color:white;}
.remove-question-btn:hover{background:#dc2626;}

.add-question-btn{background:#60A5FA;color:white;}
.add-question-btn:hover{background:#3B82F6;}

.save-test-btn{
  background:#1E3A8A;color:white;display:block;
  margin:2rem auto 0 auto;
}
.save-test-btn:hover{background:#3B82F6;}

/* Back Button */
.back-btn {
  display: inline-block;
  margin-bottom: 20px;
  background-color: #1E3A8A;
  color: white;
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}
.back-btn:hover { background-color:#3B82F6; }

.question-type {
  margin-bottom: 1rem;
  padding: 0.5rem;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<main class="main-content">

<!-- BACK BUTTON -->
<a href="{{ url_for('teacher_query_test', classroom_id=test.classroom_id) }}" class="back-btn">← Back</a>

<h1>Edit Test: {{ test.title }}</h1>

<div class="edit-test">
    <h2>Test Details</h2>

    <input type="text" id="testTitle" value="{{ test.title }}" required>
    <textarea id="testDesc" rows="3">{{ test.description }}</textarea>

    <h2 style="margin-top:1.5rem;">Questions</h2>
    <div id="questionsContainer">

        {% for q in test.questions %}
        <div class="question" data-id="{{ q.id }}">
            <h3>Question</h3>
            <input type="text" class="question-input" value="{{ q.question_text }}">

            <select class="question-type" onchange="toggleQuestionType(this)">
                <option value="mcq" {% if q.question_type=='mcq' %}selected{% endif %}>Multiple Choice Question</option>
                <option value="text" {% if q.question_type=='text' %}selected{% endif %}>Text Answer Question</option>
            </select>

            <!-- MCQ OPTIONS -->
            <div class="options" {% if q.question_type=='text' %}style="display:none"{% endif %}>
                {% for opt in q.options %}
                <div class="option-item">
                    <input type="radio" name="correct_{{ q.id }}" value="{{ loop.index }}" 
                        {% if q.correct_option == loop.index|string %}checked{% endif %}>
                    <input type="text" class="opt-input" value="{{ opt.option_text }}">
                </div>
                {% endfor %}
                <button class="add-option-btn" onclick="addOption(this)">+ Add Option</button>
            </div>

            <!-- TEXT ANSWER -->
            <div class="text-answer" {% if q.question_type=='mcq' %}style="display:none"{% endif %}>
                <textarea class="text-answer-input" rows="3">{{ q.correct_option }}</textarea>
            </div>

            <button class="remove-question-btn" onclick="removeQuestion(this)">Remove Question</button>
        </div>
        {% endfor %}
    </div>

    <button class="add-question-btn" onclick="addQuestion()">+ Add Question</button>
<button type="button" class="save-test-btn" onclick="saveTest({{ test.id }})">💾 Save Changes</button>

</div>
</main>

<script>
lucide.createIcons();

// Toggle question type display
function toggleQuestionType(select) {
    const qBox = select.closest(".question");
    const options = qBox.querySelector(".options");
    const textAns = qBox.querySelector(".text-answer");

    if (select.value === "text") {
        options.style.display = "none";
        textAns.style.display = "block";
    } else {
        options.style.display = "flex";
        textAns.style.display = "none";
    }
}

// Remove a question
function removeQuestion(btn) {
    btn.closest(".question").remove();
}

// Add a new question
function addQuestion() {
    const id = "new_" + Date.now();
    const container = document.getElementById("questionsContainer");

    container.insertAdjacentHTML("beforeend", `
    <div class="question" data-id="${id}">
        <h3>Question</h3>
        <input type="text" class="question-input" placeholder="Enter question">

        <select class="question-type" onchange="toggleQuestionType(this)">
            <option value="mcq">Multiple Choice Question</option>
            <option value="text">Text Answer Question</option>
        </select>

        <div class="options">
            <div class="option-item">
                <input type="radio" name="correct_${id}" value="1">
                <input type="text" class="opt-input" placeholder="Option 1">
            </div>
            <div class="option-item">
                <input type="radio" name="correct_${id}" value="2">
                <input type="text" class="opt-input" placeholder="Option 2">
            </div>
            <button class="add-option-btn" type="button" onclick="addOption(this)">+ Add Option</button>
        </div>

        <div class="text-answer" style="display:none">
            <textarea class="text-answer-input" rows="3" placeholder="Answer here"></textarea>
        </div>

        <button class="remove-question-btn" type="button" onclick="removeQuestion(this)">Remove Question</button>
    </div>
    `);
}

// Add an option to an MCQ
function addOption(btn) {
    const parent = btn.closest(".options");
    const qBox = btn.closest(".question");
    const qId = qBox.getAttribute("data-id");

    const count = parent.querySelectorAll(".option-item").length + 1;

    parent.insertAdjacentHTML("beforeend", `
        <div class="option-item">
            <input type="radio" name="correct_${qId}" value="${count}">
            <input type="text" class="opt-input" placeholder="Option ${count}">
        </div>
    `);
}

// Save test
function saveTest(testId) {
    const saveBtn = document.querySelector(".save-test-btn");
    saveBtn.disabled = true;

    const data = {
        title: document.getElementById("testTitle").value.trim(),
        description: document.getElementById("testDesc").value.trim(),
        questions: []
    };

    if (!data.title) { alert("Test title cannot be empty!"); saveBtn.disabled = false; return; }

    document.querySelectorAll(".question").forEach(q => {
        const id = q.getAttribute("data-id");
        const qText = q.querySelector(".question-input").value.trim();
        const qType = q.querySelector(".question-type").value;

        if (!qText) return; // Skip empty questions

        let qData = { id: id, question: qText, type: qType };

        if (qType === "mcq") {
            qData.options = [];
            let correctOptionText = null;

            q.querySelectorAll(".option-item").forEach(o => {
                const val = o.querySelector(".opt-input").value.trim();
                const radio = o.querySelector("input[type='radio']");
                if (val) qData.options.push(val); // Only include non-empty options
                if (radio.checked) correctOptionText = val;
            });

            if (qData.options.length < 2) {
                alert("MCQs must have at least 2 options.");
                saveBtn.disabled = false;
                return;
            }

            qData.correct = correctOptionText || qData.options[0]; // Default to first if none selected
        } else {
            const ans = q.querySelector(".text-answer-input").value.trim();
            if (!ans) { alert("Text answer cannot be empty!"); saveBtn.disabled = false; return; }
            qData.answer = ans;
        }

        data.questions.push(qData);
    });

    fetch(`/teacher/test/${testId}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(res => {
        if (!res.ok) return res.json().then(err => { throw new Error(err.error || 'Save failed'); });
        return res.json();
    })
    .then(resp => {
        if (resp.success) {
            alert("Test updated successfully!");
            location.reload();
        } else {
            throw new Error(resp.error || "Save failed");
        }
    })
    .catch(err => {
        console.error("Save failed:", err);
        alert("Error saving test: " + err.message);
    })
    .finally(() => saveBtn.disabled = false);
}
</script>


</body>
</html>
