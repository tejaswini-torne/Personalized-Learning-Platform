<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SQL Assessment Platform</title>

  
  <style>
    /* ===== Global Styling ===== */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #e9f3ff;
    }

    /* ---- Navbar ---- */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      background: linear-gradient(90deg, #1E3A8A, #3B82F6);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .navbar .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
    }

    /* ===== Login Form ===== */
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      padding: 50px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0056b3;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    .login-container input:focus {
      border-color: #0056b3;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      background: #0056b3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-container button:hover {
      background: #003d82;
    }

    .login-container p {
      text-align: center;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .login-container p a {
      color: #0056b3;
      text-decoration: none;
      font-weight: bold;
    }

    .login-container p a:hover {
      text-decoration: underline;
    }

    /* Flash message styling */
    .flash-message {
      text-align: center;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 5px;
    }
    .flash-success { background-color: #d1fae5; color: #065f46; }
    .flash-danger { background-color: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">SQL Assessment</div>
</header>

<!-- Flash Messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash-message flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- Login Form -->
<div class="login-container">
  <h2>Login</h2>
  <form method="POST" action="{{ url_for('login') }}">
    <input type="email" name="email" placeholder="Email Address" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>
  <p>Don’t have an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>

</body>
</html>
