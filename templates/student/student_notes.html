<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ classroom.name }} - Student Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body {background:#f0f4ff;color:#333;padding:2rem;}

/* ---- Back Button ---- */
.back-button {
  display:inline-flex;
  align-items:center;
  gap:0.5rem;
  background:#1E3A8A;
  color:white;
  padding:0.5rem 1rem;
  border-radius:8px;
  text-decoration:none;
  font-weight:600;
  margin-bottom:2rem;
  transition:0.3s;
}
.back-button:hover {background:#3B82F6;}

/* ---- Notes List ---- */
h1 {text-align:center;margin-bottom:1.5rem;color:#1E3A8A;}
.notes-list {max-width:700px;margin:0 auto;text-align:left;}
.notes-list h2 {margin-bottom:1rem;color:#1E3A8A;}
.note-item {background:white;padding:1rem;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;}
.note-actions {display:flex; gap:0.5rem;}
.note-actions a {
  background:#3B82F6; 
  border:none; 
  color:white; 
  padding:0.3rem 0.6rem; 
  border-radius:6px;
  cursor:pointer; 
  font-weight:600; 
  text-decoration:none; 
  transition:0.3s;
}
.note-actions a:hover {background:#60A5FA;}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Back Button -->
<a href="{{ url_for('student_classroom_features', classroom_id=classroom.id) }}" class="back-button">
    <i data-lucide="arrow-left"></i> Back
</a>

<h1>Class Notes - {{ classroom.name }}</h1>

<div class="notes-list">
  <h2>Available Notes</h2>

  {% if notes %}
    {% for note in notes %}
      <div class="note-item">
        <span><strong>{{ note.title }}</strong> ({{ note.filename }})</span>
        <div class="note-actions">
          <a href="{{ url_for('view_note', note_id=note.id) }}" target="_blank">View</a>
          <a href="{{ url_for('download_note', note_id=note.id) }}">Download</a>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No notes have been shared yet.</p>
  {% endif %}
</div>

<script>
  lucide.createIcons();
</script>
</body>
</html>
