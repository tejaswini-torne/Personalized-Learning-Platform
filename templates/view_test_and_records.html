<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Records - SQL Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 2rem;
}

/* ---- Header ---- */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1000px;
  margin: 0 auto 1.5rem auto;
}

.back-btn {
  background: #1E3A8A;
  color: white;
  border: none;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.3s;
}
.back-btn:hover {
  background: #172554;
}

.classroom-title {
  font-size: 1.5rem;
  color: #1E3A8A;
  font-weight: 700;
}

/* ---- Test Records ---- */
.test-records {
  background: white;
  border-radius: 12px;
  padding: 1.5rem;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  max-width: 1000px;
  margin: 0 auto;
}

.test-records h2 {
  color: #1E3A8A;
  margin-bottom: 1rem;
}

.test-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 1rem;
}

.test-table th, .test-table td {
  padding: 0.8rem 1rem;
  text-align: left;
  border-bottom: 1px solid #e5e7eb;
}

.test-table th {
  background: #eff6ff;
  color: #1E3A8A;
}

.test-table tr:hover {
  background: #f9faff;
}

.test-actions button {
  border: none;
  cursor: pointer;
  font-weight: 600;
  border-radius: 8px;
  padding: 0.4rem 0.8rem;
  transition: 0.3s;
}

.view-btn {
  color: #1E3A8A;
  background: #e0e7ff;
}
.view-btn:hover { background: #c7d2fe; }


.edit-btn {
    background-color: #ffc107;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
}

.edit-btn:hover {
    background-color: #e0a800;
}


.post-btn {
    background-color: #4CAF50;
    color: white;
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

.post-btn:hover {
    background-color: #45a049;
}


.delete-btn {
  color: white;
  background: #dc2626;
}
.delete-btn:hover { background: #b91c1c; }
</style>
</head>
<body>





<!-- Header with Back Button and Classroom Name -->
<div class="header">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="classroom-title">{{ classroom.name }}</div>
</div>

<!-- Test Records Section -->
<div class="test-records">
  <h2>Test Records</h2>
  
  <table class="test-table">
    <thead>
      <tr>
        <th>Test Name</th>
        <th>Total Questions</th>
        <th>Date Created</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for test in tests %}
      <tr>
        <td>{{ test.title }}</td>
        <td>{{ test.questions|length }}</td>
        <td>{{ test.created_at.strftime('%d %b %Y') if test.created_at else 'N/A' }}</td>
        <td class="test-actions">
<button class="view-btn" onclick="window.location.href='{{ url_for('view_test', test_id=test.id) }}'">View</button>
<button class="edit-btn" onclick="window.location.href='{{ url_for('edit_test', test_id=test.id) }}'">Edit</button>

<button class="post-btn" onclick="window.location.href='/teacher/test/{{ test.id }}/post'">Post</button>

          <button class="delete-btn" onclick="deleteTest({{ test.id }})">Delete</button>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="4" style="text-align:center; color:gray;">No tests created yet</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
function deleteTest(testId) {
    if (!confirm("Are you sure you want to delete this test?")) return;

    fetch(`/teacher/delete_test/${testId}`, {
        method: "POST"
    })
    .then(response => {
        if (response.ok) {
            location.reload();  // refresh page after deletion
        } else {
            alert("Failed to delete test.");
        }
    })
    .catch(error => {
        alert("Error deleting test.");
    });
}
</script>

</body>


</body>

</html>
