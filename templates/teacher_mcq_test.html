<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create MCQ Test - SQL Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:#f0f4ff;color:#333;display:flex;}
.main-content{margin:auto;padding:2rem;flex:1;max-width:1000px;}
h1{text-align:center;color:#1E3A8A;margin-bottom:1.5rem;}
.create-test{
  background:white;border-radius:12px;padding:1.5rem;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin:0 auto;
}
.create-test h2{color:#1E3A8A;margin-bottom:1rem;}
.create-test input[type="text"],.create-test textarea{
  padding:0.8rem;border:1px solid #ccc;border-radius:8px;
  font-size:1rem;width:100%;margin-bottom:1rem;
}
.create-test button{
  background:#1E3A8A;color:white;border:none;
  padding:0.7rem 1.3rem;border-radius:8px;
  font-size:0.95rem;cursor:pointer;transition:0.3s;
}
.create-test button:hover{background:#3B82F6;}
.question{
  border:1px solid #e0e7ff;border-radius:12px;
  padding:1rem;margin-bottom:1.2rem;background:#f9faff;
}
.question h3{margin-bottom:0.5rem;color:#1E3A8A;}
.options{margin-top:0.5rem;display:flex;flex-direction:column;gap:0.5rem;}
.option-item{display:flex;align-items:center;gap:0.5rem;}
.option-item input[type="text"]{flex:1;padding:0.6rem;border:1px solid #ccc;border-radius:8px;}
.option-item input[type="radio"]{accent-color:#1E3A8A;transform:scale(1.2);}
.add-option-btn,.add-question-btn,.save-test-btn{
  margin-top:0.8rem;border:none;padding:0.6rem 1.2rem;
  border-radius:8px;font-weight:600;cursor:pointer;transition:0.3s;
}
.add-option-btn{background:#e0e7ff;color:#1E3A8A;}
.add-option-btn:hover{background:#c7d2fe;}
.add-question-btn{background:#60A5FA;color:white;}
.add-question-btn:hover{background:#3B82F6;}
.save-test-btn{
  background:#1E3A8A;color:white;display:block;
  margin:2rem auto 0 auto;
}
.save-test-btn:hover{background:#3B82F6;}

/* ✅ Back Button */
.back-btn {
  display: inline-block;
  margin-bottom: 20px;
  background-color: #1E3A8A;
  color: white;
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}
.back-btn:hover {
  background-color: #3B82F6;
}

/* ✅ Dropdown styling */
.question-type {
  margin-bottom: 1rem;
  padding: 0.5rem;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 0.95rem;
}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Main Content -->
<main class="main-content">

 
 <!-- ✅ Back Button -->
{% if classroom_id %}
  <a href="{{ url_for('teacher_classroom_features', classroom_id=classroom_id) }}" class="back-btn">← Back</a>
{% else %}
  <a href="{{ url_for('teacher_dashboard') }}" class="back-btn">← Back</a>
{% endif %}


  <!-- ✅ Dynamic Title -->
  {% if classroom %}
    <h1>Create MCQ Test for {{ classroom.name }}</h1>
  {% else %}
    <h1>Create MCQ Test</h1>
  {% endif %}

  <div class="create-test">
    <h2>New Test Details</h2>
    <input type="text" id="testName" placeholder="Enter test name" required>
    <textarea id="testDescription" rows="3" placeholder="Enter test description" required></textarea>

    <h2 style="margin-top:1.5rem;">Questions</h2>
    <div id="questionsContainer"></div>

    <button class="add-question-btn" id="addQuestionBtn">+ Add Question</button>
    <button class="save-test-btn" id="saveTestBtn">💾 Save Test</button>
  </div>
</main>

<script>
lucide.createIcons();

const questionsContainer = document.getElementById("questionsContainer");
const addQuestionBtn = document.getElementById("addQuestionBtn");
let questionCount = 0;

addQuestionBtn.addEventListener("click", () => {
  questionCount++;
  const qDiv = document.createElement("div");
  qDiv.classList.add("question");
  qDiv.dataset.qid = questionCount;

  qDiv.innerHTML = `
    <h3>Question ${questionCount}</h3>
    <input type="text" class="question-text" placeholder="Enter question text" required>
    
    <!-- ✅ Question Type Dropdown -->
    <select class="question-type" onchange="toggleQuestionType(${questionCount}, this.value)">
      <option value="mcq" selected>Multiple Choice Question</option>
      <option value="text">Text Answer Question</option>
    </select>

    <!-- ✅ MCQ Section -->
    <div class="options" id="options-${questionCount}">
      <div class="option-item">
        <input type="radio" name="correct-${questionCount}" value="1">
        <input type="text" placeholder="Option 1">
      </div>
      <div class="option-item">
        <input type="radio" name="correct-${questionCount}" value="2">
        <input type="text" placeholder="Option 2">
      </div>
    </div>
    <button type="button" class="add-option-btn" id="addOptionBtn-${questionCount}" onclick="addOption(${questionCount})">+ Add Option</button>

    <!-- ✅ Text Answer Section (hidden initially) -->
    <div class="text-answer" id="textAnswer-${questionCount}" style="display:none;">
      <textarea placeholder="Enter model answer or leave blank for student input" rows="3" style="width:100%;padding:0.7rem;border-radius:8px;border:1px solid #ccc;"></textarea>
    </div>
  `;
  questionsContainer.appendChild(qDiv);
});

function toggleQuestionType(qid, type) {
  const mcqOptions = document.getElementById(`options-${qid}`);
  const addOptionBtn = document.getElementById(`addOptionBtn-${qid}`);
  const textAnswer = document.getElementById(`textAnswer-${qid}`);

  if (type === "text") {
    mcqOptions.style.display = "none";
    addOptionBtn.style.display = "none";
    textAnswer.style.display = "block";
  } else {
    mcqOptions.style.display = "flex";
    addOptionBtn.style.display = "inline-block";
    textAnswer.style.display = "none";
  }
}

function addOption(qid) {
  const optionsDiv = document.getElementById(`options-${qid}`);
  const count = optionsDiv.children.length + 1;
  const option = document.createElement("div");
  option.classList.add("option-item");
  option.innerHTML = `
    <input type="radio" name="correct-${qid}" value="${count}">
    <input type="text" placeholder="Option ${count}">
  `;
  optionsDiv.appendChild(option);
}

document.getElementById("saveTestBtn").addEventListener("click", async () => {
  const testName = document.getElementById("testName").value.trim();
  const testDescription = document.getElementById("testDescription").value.trim();
  if (!testName || !testDescription) { alert("Please fill in all fields!"); return; }

  const questions = [];
  document.querySelectorAll(".question").forEach((qDiv, i) => {
    const questionText = qDiv.querySelector(".question-text").value.trim();
    const type = qDiv.querySelector(".question-type").value;
    let questionData = { question: questionText, type };

    if (type === "mcq") {
      const options = [];
      qDiv.querySelectorAll(".option-item").forEach(opt => {
        options.push(opt.querySelector("input[type='text']").value.trim());
      });
      const correct = qDiv.querySelector("input[type='radio']:checked")?.value || null;
      if (!questionText || options.some(o => !o)) return;
      questionData.options = options;
      questionData.correct = correct;
    } else {
      const textAnswer = qDiv.querySelector(".text-answer textarea").value.trim();
      questionData.answer = textAnswer || null;
    }

    questions.push(questionData);
  });

  if (questions.length === 0) { alert("Please add at least one question!"); return; }

const payload = { 
  name: testName, 
  description: testDescription, 
  questions,
classroom_id: {{ classroom_id | tojson }}

};


  const res = await fetch("/save_test", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    alert("✅ Test saved successfully!");
    document.getElementById("testName").value = "";
    document.getElementById("testDescription").value = "";
    questionsContainer.innerHTML = "";
  } else {
    alert("❌ Error saving test. Please try again.");
  }
});
</script>
</body>
</html>
